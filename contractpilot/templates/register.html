{% extends "base.html" %}
{% block title %}Sign Up — ContractPilot{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h1>Create Your Account</h1>
        <p>Start with 1 free contract analysis. No credit card required.</p>
        <form id="registerForm" class="auth-form">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" placeholder="Jane Smith">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" name="email" required placeholder="you@company.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="8" placeholder="••••••••">
            </div>
            <button type="submit" class="btn-primary btn-full">Create Account</button>
        </form>
        <p class="auth-footer">Already have an account? <a href="/login">Log in</a></p>
        <div id="registerError" class="alert alert-error" style="display:none"></div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const form = e.target;
    const data = {
        full_name: form.full_name.value,
        email: form.email.value,
        password: form.password.value
    };

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });
        const result = await res.json();
        if (res.ok) {
            localStorage.setItem('token', result.access_token);
            window.location.href = '/dashboard';
        } else {
            document.getElementById('registerError').textContent = result.detail || 'Registration failed';
            document.getElementById('registerError').style.display = 'block';
        }
    } catch (err) {
        document.getElementById('registerError').textContent = 'Network error. Please try again.';
        document.getElementById('registerError').style.display = 'block';
    }
});
</script>
{% endblock %}
